name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: devops-flask-app

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest

    - name: Run Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest

  docker-build:

    needs: build-test
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}

    - name: Build Docker Image
      run: |
        docker build -t $IMAGE_NAME:${{ github.sha }} .

    - name: Push Image
      run: |
        docker tag $IMAGE_NAME:${{ github.sha }} ${{ secrets.DOCKER_USER }}/$IMAGE_NAME:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USER }}/$IMAGE_NAME:${{ github.sha }}

    - name: Update Kubernetes Repo
      run: |
        git clone https://$GH_PAT@github.com/GoravaSivakumar/sample-devops-k8s.git
        cd sample-devops-k8s

        sed -i "s|image:.*|image: ${{ secrets.DOCKER_USER }}/devops-flask-app:${{ github.sha }}|g" deployment.yaml

        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add deployment.yaml
        git commit -m "Update image tag ${{ github.sha }}"
        git push
      env:
        GH_PAT: ${{ secrets.GH_PAT }}